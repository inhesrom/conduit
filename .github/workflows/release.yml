name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build web UI
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Ensure web UI is bundled (not the placeholder)
        run: |
          if grep -q "been built yet" web/app/dist/index.html; then
            echo "::error::web UI build produced the placeholder; aborting release"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p tui

      - name: Verify binary version
        run: test "$(target/release/conduit --version | awk '{print $2}')" = "${GITHUB_REF_NAME#v}"

      - name: Package
        run: tar czf conduit-${{ matrix.target }}.tar.gz -C target/release conduit

      - uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ matrix.target }}
          path: conduit-${{ matrix.target }}.tar.gz

  desktop:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            formats: app,dmg
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            formats: deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build web UI
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Ensure web UI is bundled (not the placeholder)
        run: |
          if grep -q "been built yet" web/app/dist/index.html; then
            echo "::error::web UI build produced the placeholder; aborting release"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libfuse2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build desktop binary
        run: cargo build --release -p tui --features desktop

      - name: Verify binary version
        run: test "$(target/release/conduit --version | awk '{print $2}')" = "${GITHUB_REF_NAME#v}"

      - name: Package desktop app
        run: cargo packager --release -p tui -f ${{ matrix.formats }} --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: conduit-desktop-${{ matrix.target }}
          path: |
            target/release/*.dmg
            target/release/*.deb
            target/release/*.AppImage

  release:
    needs: [build, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            conduit-*.tar.gz
            *.dmg
            *.deb
            *.AppImage
