name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build web UI
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build
      - uses: dtolnay/rust-toolchain@stable
      # The desktop feature is on by default, so the workspace (and `conduit`)
      # link WebKitGTK/GTK3 — install their dev packages before building.
      - name: Install desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libfuse2
      - run: cargo test --workspace
      - run: cargo build --release -p tui

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build web UI
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build
      - uses: dtolnay/rust-toolchain@stable
      # No GTK/WebKit on Windows: the default `desktop` feature links the system
      # WebView2 runtime, whose SDK import libs ship vendored via the wry/webview2
      # crates — the windows-latest runner already has the MSVC toolchain + SDK.
      - run: cargo test --workspace
      - run: cargo build --release -p tui
      - name: Upload conduit.exe
        uses: actions/upload-artifact@v4
        with:
          name: conduit-windows-x86_64
          path: target/release/conduit.exe
